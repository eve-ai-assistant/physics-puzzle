<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Slingshot Valley</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>

    <style>
        :root {
            --coral: #FF7F50;
            --sky-top: #8DE3FE;
            --sky-bot: #FFFFFF;
            --text: #333333;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #111; overflow: hidden;
            touch-action: none; overscroll-behavior: none;
            user-select: none; -webkit-user-select: none;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* 1080x1920 Logical Constraints */
        #game-wrapper {
            position: absolute;
            width: 1080px; height: 1920px;
            background: linear-gradient(to bottom, var(--sky-top), var(--sky-bot));
            transform-origin: top left;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            overflow: hidden;
        }

        canvas { position: absolute; top: 0; left: 0; z-index: 1; touch-action: none; }

        /* UI Overlay Elements */
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10; pointer-events: none;
        }

        .screen {
            position: absolute; inset: 0;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            pointer-events: auto; transition: opacity 0.3s;
        }
        .hidden { opacity: 0; pointer-events: none !important; }

        .card {
            background: #FFFFFF; padding: 80px 60px; border-radius: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1); text-align: center; width: 80%; max-width: 850px;
        }

        h1 { font-size: 100px; color: var(--text); margin: 0 0 20px 0; letter-spacing: 2px; font-weight: 900; }
        h2 { font-size: 45px; color: #888; margin: 0 0 60px 0; font-weight: normal; }

        .btn {
            background: var(--coral); color: white; border: none; border-radius: 30px;
            padding: 35px 80px; font-size: 45px; font-weight: 800; cursor: pointer;
            box-shadow: 0 15px 30px rgba(255,127,80,0.3); transition: transform 0.1s; margin: 15px;
        }
        .btn:active { transform: scale(0.95); }
        .btn-alt { background: #E0E0E0; color: #555; box-shadow: 0 15px 30px rgba(0,0,0,0.1); }

        .icon-btn {
            width: 100px; height: 100px; border-radius: 50px; background: #FFFFFF; color: var(--coral);
            border: none; font-size: 50px; font-weight: bold; cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1); display: flex; justify-content: center; align-items: center;
            transition: transform 0.1s; pointer-events: auto;
        }
        .icon-btn:active { transform: scale(0.9); }

        /* Level Grid */
        #level-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 40px; margin-bottom: 50px; }
        .lvl-btn {
            background: white; border: 6px solid var(--coral); color: var(--coral);
            border-radius: 40px; height: 200px; display: flex; flex-direction: column; justify-content: center; align-items: center;
            font-size: 70px; font-weight: bold; cursor: pointer; box-shadow: 0 15px 30px rgba(0,0,0,0.1);
        }
        .lvl-btn:active { transform: scale(0.95); }
        .lvl-btn.locked { border-color: #D0D0D0; background: #F0F0F0; color: #A0A0A0; box-shadow: none; pointer-events: none; }
        .lvl-stars { font-size: 30px; color: #FFD700; margin-top: 15px; letter-spacing: 4px; }

        /* Orientation Enforcer */
        #landscape-blocker {
            display: none; position: fixed; inset: 0; background: var(--sky-top); color: white;
            z-index: 9999; flex-direction: column; justify-content: center; align-items: center; text-align: center;
        }
        @media (orientation: landscape) and (max-height: 600px) {
            #landscape-blocker { display: flex; } #game-wrapper { display: none !important; }
        }
    </style>
</head>
<body>

<div id="landscape-blocker">
    <div style="font-size: 100px; margin-bottom: 30px;">📱</div>
    <h2 style="color:white;">Please Rotate Device</h2>
    <p style="font-size:30px;">Designed strictly for portrait, one-handed play.</p>
</div>

<div id="game-wrapper">
    <canvas id="game-canvas"></canvas>
    
    <div id="ui-layer">
        <div id="ui-hud" class="hidden" style="position: absolute; top: 80px; left: 60px; right: 60px; pointer-events: none;">
            <div style="position: absolute; top: 0; left: 0; pointer-events: auto;">
                <div style="font-size: 50px; font-weight: 800; color: #333; background: rgba(255,255,255,0.9); padding: 20px 45px; border-radius: 40px; box-shadow: 0 10px 20px rgba(0,0,0,0.1);" id="hud-level">Level 1</div>
                <div id="hud-shots" style="display: flex; gap: 15px; margin-top: 25px; padding-left: 20px;"></div>
            </div>
            <div style="position: absolute; top: 0; right: 0; display: flex; gap: 20px; pointer-events: auto;">
                <button class="icon-btn" onclick="retryLevel()">↻</button>
                <button class="icon-btn" onclick="uiShowLevelSelect()">☰</button>
            </div>
        </div>

        <div id="menu-screen" class="screen">
            <div class="card" style="background: transparent; box-shadow: none;">
                <h1>SLINGSHOT</h1>
                <h2>MONUMENT VALLEY</h2>
                <button class="btn" onclick="uiShowLevelSelect()">PLAY</button>
            </div>
        </div>

        <div id="level-select-screen" class="screen hidden">
            <div class="card" style="width: 85%;">
                <h1 style="font-size: 60px; margin-bottom: 50px;">LEVELS</h1>
                <div id="level-grid"></div>
                <button class="btn btn-alt" onclick="uiShowMenu()">BACK</button>
            </div>
        </div>

        <div id="end-screen" class="screen hidden">
            <div class="card">
                <h1 id="end-title">SUBLIME!</h1>
                <div id="end-stars" style="display: flex; justify-content: center; gap: 20px; margin: 50px 0;"></div>
                <button class="btn" id="end-next-btn" onclick="nextLevel()">NEXT LEVEL</button><br>
                <button class="btn btn-alt" onclick="retryLevel()">RETRY</button>
                <button class="btn btn-alt" onclick="uiShowMenu()">MENU</button>
            </div>
        </div>
    </div>
</div>

<script>
/** =======================================================================
 *  SYNTHETIC WEB AUDIO ENGINE
 *  ======================================================================= */
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let audioInit = false;
let lastCrashTime = 0;

function unlockAudio() { if (!audioInit) { audioCtx.resume(); audioInit = true; } }

function playTwang() {
    if (audioCtx.state === 'suspended') return;
    const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(300, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.2);
    gain.gain.setValueAtTime(0.6, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + 0.2);
}

function playCrash() {
    if (audioCtx.state === 'suspended') return;
    let now = Date.now(); if (now - lastCrashTime < 100) return; lastCrashTime = now;
    const bufSize = audioCtx.sampleRate * 0.2, buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
    const data = buf.getChannelData(0); for(let i=0; i<bufSize; i++) data[i] = Math.random() * 2 - 1;
    const noise = audioCtx.createBufferSource(), filter = audioCtx.createBiquadFilter(), gain = audioCtx.createGain();
    noise.buffer = buf; filter.type = 'lowpass'; filter.frequency.value = 600;
    gain.gain.setValueAtTime(0.5, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
    noise.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination); noise.start();
}

function playPop() {
    if (audioCtx.state === 'suspended') return;
    const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(500, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(1000, audioCtx.currentTime + 0.15);
    gain.gain.setValueAtTime(0.6, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + 0.15);
}

/** =======================================================================
 *  CORE SETUP & SCALING LOGIC
 *  ======================================================================= */
const LOGICAL_W = 1080, LOGICAL_H = 1920;
const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');
let currentScale = 1;

function resize() {
    const ww = window.innerWidth, wh = window.innerHeight;
    currentScale = Math.min(ww / LOGICAL_W, wh / LOGICAL_H);
    const wrapper = document.getElementById('game-wrapper');
    wrapper.style.transform = `scale(${currentScale})`;
    wrapper.style.left = `${(ww - LOGICAL_W * currentScale) / 2}px`;
    wrapper.style.top = `${(wh - LOGICAL_H * currentScale) / 2}px`;
    
    const dpr = window.devicePixelRatio || 1;
    canvas.width = LOGICAL_W * dpr; canvas.height = LOGICAL_H * dpr;
    ctx.scale(dpr, dpr);
}
window.addEventListener('resize', resize); resize();

/** =======================================================================
 *  MATTER.JS PHYSICS & ENTITIES
 *  ======================================================================= */
const engine = Matter.Engine.create({ positionIterations: 16, velocityIterations: 16 });
engine.world.gravity.y = 1.2;

let gameState = 'MENU'; // MENU, LEVEL_SELECT, PLAYING, ENDED
let turnState = 'IDLE'; // IDLE, AIMING, FLYING, SETTLING
let currentLevel = 0, projectiles = 0, targetsLeft = 0;
let projectile = null, particles = [], screenShake = 0;
let bodiesToRemove = [], bodiesToAdd = [];

const SLING_ANCHOR = { x: 250, y: 1400 };

function addBlock(x, y, w, h, type) {
    let opts = { friction: 0.6, restitution: 0.1, label: type };
    if (type === 'wood') { opts.density = 0.003; opts.customColor = '#CD853F'; }
    else if (type === 'stone') { opts.density = 0.008; opts.customColor = '#95A5A6'; }
    else if (type === 'glass') { opts.density = 0.001; opts.customColor = 'rgba(173, 216, 230, 0.5)'; }
    let b = Matter.Bodies.rectangle(x, y, w, h, opts);
    b.customWidth = w; b.customHeight = h;
    Matter.World.add(engine.world, b);
}

function addPig(x, y) {
    let b = Matter.Bodies.circle(x, y, 25, { density: 0.002, friction: 0.5, restitution: 0.4, label: 'pig' });
    Matter.World.add(engine.world, b); targetsLeft++;
}

function spawnProjectile() {
    projectile = Matter.Bodies.circle(SLING_ANCHOR.x, SLING_ANCHOR.y, 25, {
        density: 0.015, friction: 0.5, restitution: 0.4, frictionAir: 0, // 0 air friction = perfect trajectory mapping
        label: 'projectile', isBullet: true, isStatic: true
    });
    Matter.World.add(engine.world, projectile);
}

/** =======================================================================
 *  CLEVER LEVEL DESIGN ARRAYS
 *  ======================================================================= */
const LEVELS = [
    { shots: 3, build: () => {
        addBlock(750, 1500, 60, 200, 'glass'); addPig(750, 1375);
    }},
    { shots: 3, build: () => {
        addBlock(650, 1500, 40, 200, 'wood'); addBlock(850, 1500, 40, 200, 'wood');
        addBlock(750, 1380, 280, 40, 'wood'); addPig(750, 1560); addPig(750, 1335);
    }},
    { shots: 4, build: () => {
        addBlock(550, 1500, 40, 200, 'stone'); addBlock(750, 1500, 40, 200, 'stone'); addBlock(950, 1500, 40, 200, 'stone');
        addBlock(650, 1380, 240, 40, 'glass'); addBlock(850, 1380, 240, 40, 'glass');
        addBlock(750, 1260, 40, 200, 'wood'); addPig(650, 1560); addPig(850, 1560); addPig(750, 1140);
    }},
    { shots: 3, build: () => {
        addBlock(500, 1450, 20, 300, 'wood'); addBlock(650, 1450, 20, 300, 'wood');
        addBlock(800, 1450, 20, 300, 'wood'); addBlock(950, 1450, 20, 300, 'wood');
        addPig(575, 1560); addPig(725, 1560); addPig(875, 1560);
    }},
    { shots: 5, build: () => {
        addBlock(550, 1500, 40, 200, 'stone'); addBlock(950, 1500, 40, 200, 'stone');
        addBlock(750, 1380, 500, 40, 'stone'); addBlock(650, 1260, 40, 200, 'glass'); addBlock(850, 1260, 40, 200, 'glass');
        addBlock(750, 1140, 300, 40, 'wood'); addBlock(750, 1040, 40, 160, 'glass');
        addPig(750, 1560); addPig(750, 1335); addPig(650, 1100); addPig(850, 1100); addPig(750, 935);
    }}
];

/** =======================================================================
 *  UI & STATE ROUTING
 *  ======================================================================= */
function uiShowMenu() {
    gameState = 'MENU';
    document.querySelectorAll('.screen, #ui-hud').forEach(e => e.classList.add('hidden'));
    document.getElementById('menu-screen').classList.remove('hidden');
}

function uiShowLevelSelect() {
    gameState = 'LEVEL_SELECT'; unlockAudio();
    document.querySelectorAll('.screen, #ui-hud').forEach(e => e.classList.add('hidden'));
    document.getElementById('level-select-screen').classList.remove('hidden');
    
    let prog = JSON.parse(localStorage.getItem('sling_prog') || '{}');
    const grid = document.getElementById('level-grid'); grid.innerHTML = '';
    
    LEVELS.forEach((_, i) => {
        let isUnlocked = i === 0 || prog[i - 1] !== undefined;
        let btn = document.createElement('div'); btn.className = `lvl-btn ${isUnlocked ? '' : 'locked'}`;
        if (isUnlocked) {
            btn.onclick = () => loadLevel(i);
            let stars = prog[i] || 0;
            btn.innerHTML = `<span>${i + 1}</span><span class="lvl-stars">${'★'.repeat(stars)}${'☆'.repeat(3 - stars)}</span>`;
        } else { btn.innerHTML = `<span style="color:#A0A0A0;">🔒</span>`; }
        grid.appendChild(btn);
    });
}

function updateHUD() {
    document.getElementById('hud-level').innerText = `Level ${currentLevel + 1}`;
    const dots = document.getElementById('hud-shots'); dots.innerHTML = '';
    for(let i=0; i<LEVELS[currentLevel].shots; i++) {
        let dot = document.createElement('div');
        dot.style.cssText = `width:30px; height:30px; border-radius:50%; transition:0.3s;
        background:${i < projectiles ? '#FF7F50' : 'rgba(0,0,0,0.1)'};
        border:${i < projectiles ? '4px solid white' : 'none'};
        box-shadow:${i < projectiles ? '0 0 10px rgba(255,127,80,0.5)' : 'none'};`;
        dots.appendChild(dot);
    }
}

function loadLevel(i) {
    currentLevel = i; const lvl = LEVELS[i];
    projectiles = lvl.shots; targetsLeft = 0;
    
    Matter.World.clear(engine.world); Matter.Engine.clear(engine);
    particles = []; bodiesToRemove = []; bodiesToAdd = [];
    Matter.World.add(engine.world, Matter.Bodies.rectangle(540, 1760, 2000, 320, { isStatic: true, label: 'ground', friction: 1.0 }));
    
    lvl.build(); spawnProjectile(); updateHUD();
    gameState = 'PLAYING'; turnState = 'IDLE';
    document.querySelectorAll('.screen').forEach(e => e.classList.add('hidden'));
    document.getElementById('ui-hud').classList.remove('hidden');
}

function retryLevel() { loadLevel(currentLevel); }
function nextLevel() { loadLevel(currentLevel + 1); }

function showLevelComplete(isWin) {
    gameState = 'ENDED';
    document.querySelectorAll('.screen, #ui-hud').forEach(e => e.classList.add('hidden'));
    document.getElementById('end-screen').classList.remove('hidden');
    
    const title = document.getElementById('end-title');
    const starsDiv = document.getElementById('end-stars');
    const nextBtn = document.getElementById('end-next-btn');
    
    if (isWin) {
        playPop(); title.innerText = 'SUBLIME!'; title.style.color = '#FF7F50';
        let stars = projectiles >= 2 ? 3 : (projectiles >= 1 ? 2 : 1);
        starsDiv.innerHTML = [...Array(3)].map((_, i) => `<span style="color: ${i < stars ? '#FFD700' : '#EEE'}; text-shadow: ${i < stars ? '0 0 30px rgba(255,215,0,0.5)' : 'none'}; font-size: 110px; transition:0.5s;">★</span>`).join('');
        nextBtn.style.display = currentLevel < LEVELS.length - 1 ? 'inline-block' : 'none';
        
        let prog = JSON.parse(localStorage.getItem('sling_prog') || '{}');
        prog[currentLevel] = Math.max(prog[currentLevel] || 0, stars);
        localStorage.setItem('sling_prog', JSON.stringify(prog));
    } else {
        playCrash(); title.innerText = 'OUT OF SHOTS'; title.style.color = '#333';
        starsDiv.innerHTML = '<span style="color:#EEE; font-size:110px;">☆☆☆</span>';
        nextBtn.style.display = 'none';
    }
}

/** =======================================================================
 *  INPUT HANDLING (ONE-HANDED PORTRAIT)
 *  ======================================================================= */
let activePointerId = null, aimTouchStart = {x:0, y:0}, aimTouchCurrent = {x:0, y:0};

function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    return { x: (e.clientX - rect.left) / currentScale, y: (e.clientY - rect.top) / currentScale };
}

window.addEventListener('pointerdown', e => {
    unlockAudio();
    if (e.target.closest('.screen') || e.target.closest('.icon-btn')) return;
    if (gameState !== 'PLAYING' || turnState !== 'IDLE') return;
    
    let pos = getPos(e);
    if (pos.y > 1920 * 0.4) { // Active touch exclusively in bottom 60%
        activePointerId = e.pointerId; aimTouchStart = pos; aimTouchCurrent = pos;
        turnState = 'AIMING';
    }
});

window.addEventListener('pointermove', e => {
    if (turnState === 'AIMING' && e.pointerId === activePointerId) {
        aimTouchCurrent = getPos(e);
        let dx = aimTouchStart.x - aimTouchCurrent.x, dy = aimTouchStart.y - aimTouchCurrent.y;
        let dist = Math.hypot(dx, dy);
        if (dist > 150) { dx = (dx/dist)*150; dy = (dy/dist)*150; }
        Matter.Body.setPosition(projectile, { x: SLING_ANCHOR.x - dx, y: SLING_ANCHOR.y - dy });
    }
});

function releaseDrag(e) {
    if (turnState === 'AIMING' && e.pointerId === activePointerId) {
        activePointerId = null;
        let dx = aimTouchStart.x - aimTouchCurrent.x, dy = aimTouchStart.y - aimTouchCurrent.y;
        let dist = Math.hypot(dx, dy);
        
        if (dist > 20) {
            if (dist > 150) { dx = (dx/dist)*150; dy = (dy/dist)*150; }
            Matter.Body.setStatic(projectile, false);
            Matter.Body.setVelocity(projectile, { x: dx * 0.25, y: dy * 0.25 });
            projectiles--; updateHUD(); playTwang();
            turnState = 'FLYING'; flightFrames = 0; stillFrames = 0;
        } else { turnState = 'IDLE'; Matter.Body.setPosition(projectile, SLING_ANCHOR); }
    }
}
window.addEventListener('pointerup', releaseDrag);
window.addEventListener('pointercancel', releaseDrag);

/** =======================================================================
 *  DESTRUCTION QUEUES & GAME RULES
 *  ======================================================================= */
Matter.Events.on(engine, 'beforeUpdate', () => {
    Matter.Composite.allBodies(engine.world).forEach(b => { if (!b.isStatic) b.prevVelocity = { x: b.velocity.x, y: b.velocity.y }; });
});

Matter.Events.on(engine, 'collisionStart', (event) => {
    event.pairs.forEach(pair => {
        let a = pair.bodyA, b = pair.bodyB;
        let va = a.prevVelocity || {x:0, y:0}, vb = b.prevVelocity || {x:0, y:0};
        let speed = Math.hypot(va.x - vb.x, va.y - vb.y);
        
        let checkDamage = (body, spd) => {
            if (body.isDestroyed || body.isStatic) return;
            let thresh = 999;
            if (body.label === 'pig') thresh = 2.5; else if (body.label === 'glass') thresh = 4.0;
            else if (body.label === 'wood') thresh = 7.0; else if (body.label === 'stone') thresh = 12.0;
            if (spd > thresh) { body.isDestroyed = true; if (!bodiesToRemove.includes(body)) bodiesToRemove.push(body); }
        };
        checkDamage(a, speed); checkDamage(b, speed);
    });
});

Matter.Events.on(engine, 'afterUpdate', () => {
    // Check out of bounds
    Matter.Composite.allBodies(engine.world).forEach(b => {
        if (b.position.y > 2100 || b.position.x < -500 || b.position.x > 1580) {
            if (!bodiesToRemove.includes(b)) { b.isDestroyed = true; bodiesToRemove.push(b); }
        }
        if (b.label === 'debris') { b.life = (b.life || 180) - 1; if (b.life <= 0 && !bodiesToRemove.includes(b)) bodiesToRemove.push(b); }
    });

    if (bodiesToRemove.length > 0) {
        bodiesToRemove.forEach(b => {
            Matter.Composite.remove(engine.world, b);
            if (b.label === 'pig') {
                targetsLeft--; playPop();
                for(let i=0; i<15; i++) particles.push({ x:b.position.x, y:b.position.y, vx:(Math.random()-0.5)*15, vy:(Math.random()-0.5)*15, life:1, color:'#FF7F50', size:Math.random()*8+4 });
            } else if (['glass','wood','stone'].includes(b.label)) {
                playCrash(); screenShake = Math.max(screenShake, 10);
                for(let i=0; i<8; i++) particles.push({ x:b.position.x, y:b.position.y, vx:(Math.random()-0.5)*12, vy:(Math.random()-0.5)*12, life:1, color:'#FFFFFF', size:Math.random()*6+3 });
                // Shatter Logic (Safe Scale)
                if (b.customWidth > 20 && b.customHeight > 20) {
                    let hw = b.customWidth / 2, hh = b.customHeight / 2, cos = Math.cos(b.angle), sin = Math.sin(b.angle);
                    [{x:-hw/2,y:-hh/2}, {x:hw/2,y:-hh/2}, {x:-hw/2,y:hh/2}, {x:hw/2,y:hh/2}].forEach(off => {
                        let piece = Matter.Bodies.rectangle(
                            b.position.x + (off.x * cos - off.y * sin), b.position.y + (off.x * sin + off.y * cos),
                            hw * 0.85, hh * 0.85, { label:'debris', friction:b.friction, restitution:b.restitution, density:b.density, angle:b.angle, customColor:b.customColor, customWidth:hw*0.85, customHeight:hh*0.85, collisionFilter:{group:-1} }
                        );
                        Matter.Body.setVelocity(piece, { x: b.velocity.x + (Math.random()-0.5)*4, y: b.velocity.y + (Math.random()-0.5)*4 });
                        bodiesToAdd.push(piece);
                    });
                }
            }
        });
        bodiesToRemove = [];
    }
    if (bodiesToAdd.length > 0) { Matter.Composite.add(engine.world, bodiesToAdd); bodiesToAdd = []; }
});

let flightFrames = 0, stillFrames = 0;
function endTurn() {
    turnState = 'SETTLING'; stillFrames = 0;
    if (projectile && !bodiesToRemove.includes(projectile)) { bodiesToRemove.push(projectile); projectile = null; }
}

function updateGameState() {
    if (turnState === 'FLYING') {
        let isMoving = false;
        Matter.Composite.allBodies(engine.world).forEach(b => { if (!b.isStatic && b.label !== 'debris' && (b.speed > 0.5 || Math.abs(b.angularVelocity) > 0.05)) isMoving = true; });
        if (!isMoving) { stillFrames++; if (stillFrames > 60) endTurn(); } else stillFrames = 0;
        flightFrames++;
        if (projectile && (projectile.position.y > 2100 || projectile.position.x > 1200 || projectile.position.x < -100 || flightFrames > 600)) endTurn();
    } else if (turnState === 'SETTLING') {
        let isMoving = false;
        Matter.Composite.allBodies(engine.world).forEach(b => { if (!b.isStatic && b.label !== 'debris' && (b.speed > 0.5 || Math.abs(b.angularVelocity) > 0.05)) isMoving = true; });
        if (!isMoving) {
            stillFrames++;
            if (stillFrames > 40) {
                if (targetsLeft <= 0) showLevelComplete(true);
                else if (projectiles <= 0) showLevelComplete(false);
                else { spawnProjectile(); turnState = 'IDLE'; }
            }
        } else stillFrames = 0;
    }
}

/** =======================================================================
 *  RENDERING PIPELINE
 *  ======================================================================= */
let lastTime = 0, accumulator = 0;
function render(time) {
    requestAnimationFrame(render);
    let dt = time - lastTime; lastTime = time;
    if (dt > 100) dt = 16.666; // Tab change physics explosion safety
    
    if (gameState === 'PLAYING') {
        accumulator += dt;
        while (accumulator >= 16.666) {
            Matter.Engine.update(engine, 16.666);
            updateGameState();
            accumulator -= 16.666;
        }
    }
    
    ctx.clearRect(0, 0, LOGICAL_W, LOGICAL_H);
    let grad = ctx.createLinearGradient(0, 0, 0, LOGICAL_H);
    grad.addColorStop(0, '#8DE3FE'); grad.addColorStop(1, '#FFFFFF');
    ctx.fillStyle = grad; ctx.fillRect(0, 0, LOGICAL_W, LOGICAL_H);
    
    ctx.save();
    if (screenShake > 0) {
        ctx.translate((Math.random()-0.5)*screenShake, (Math.random()-0.5)*screenShake);
        screenShake *= 0.9; if (screenShake < 0.5) screenShake = 0;
    }
    
    // Scenery Background & Slingshot
    ctx.fillStyle = '#F5DEB3'; ctx.fillRect(0, 1600, LOGICAL_W, 320);
    ctx.fillStyle = 'rgba(255,255,255,0.4)'; ctx.fillRect(0, 1600, LOGICAL_W, 10);
    ctx.fillStyle = '#8B4513'; ctx.fillRect(SLING_ANCHOR.x - 15, SLING_ANCHOR.y, 10, 1600 - SLING_ANCHOR.y);
    
    if (turnState === 'AIMING' && projectile) {
        ctx.strokeStyle = '#FF7F50'; ctx.lineWidth = 15; ctx.lineCap = 'round';
        ctx.beginPath(); ctx.moveTo(SLING_ANCHOR.x - 15, SLING_ANCHOR.y); ctx.lineTo(projectile.position.x, projectile.position.y); ctx.stroke();
        
        // Exact Math Predicted Parabola
        let dx = SLING_ANCHOR.x - aimTouchCurrent.x, dy = SLING_ANCHOR.y - aimTouchCurrent.y, dist = Math.hypot(dx, dy);
        if (dist > 150) { dx = (dx/dist)*150; dy = (dy/dist)*150; }
        if (dist > 20) {
            let tx = SLING_ANCHOR.x, ty = SLING_ANCHOR.y, tvx = dx * 0.25, tvy = dy * 0.25, distAccum = 0;
            ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
            for (let i = 0; i < 80; i++) {
                let lastTy = ty, lastTx = tx; tx += tvx; ty += tvy; tvy += 1.2 * 0.001 * 16.666;
                distAccum += Math.hypot(tx - lastTx, ty - lastTy);
                if (distAccum > 30) { ctx.beginPath(); ctx.arc(tx, ty, 6, 0, Math.PI*2); ctx.fill(); distAccum = 0; }
                if (ty > 1600) break;
            }
        }
    }

    // Physics Bodies
    Matter.Composite.allBodies(engine.world).forEach(body => {
        if (body.label === 'ground') return;
        
        if (body.label === 'projectile') {
            ctx.fillStyle = '#FFFFFF'; ctx.beginPath(); ctx.arc(body.position.x, body.position.y, body.circleRadius, 0, Math.PI*2); ctx.fill();
            ctx.strokeStyle = '#8DE3FE'; ctx.lineWidth = 4; ctx.stroke();
            ctx.save(); ctx.translate(body.position.x, body.position.y); ctx.rotate(body.angle);
            ctx.fillStyle = '#333'; ctx.beginPath(); ctx.arc(-6, -4, 3, 0, Math.PI*2); ctx.arc(6, -4, 3, 0, Math.PI*2); ctx.fill();
            ctx.restore(); return;
        }
        if (body.label === 'pig') {
            ctx.fillStyle = '#FF7F50'; ctx.beginPath(); ctx.arc(body.position.x, body.position.y, body.circleRadius, 0, Math.PI*2); ctx.fill();
            ctx.save(); ctx.translate(body.position.x, body.position.y); ctx.rotate(body.angle);
            ctx.fillStyle = '#FFFFFF'; ctx.beginPath(); ctx.arc(-8, -5, 6, 0, Math.PI*2); ctx.arc(8, -5, 6, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#333'; ctx.beginPath(); ctx.arc(-8, -5, 2, 0, Math.PI*2); ctx.arc(8, -5, 2, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#FF9977'; ctx.beginPath(); ctx.ellipse(0, 5, 10, 6, 0, 0, Math.PI*2); ctx.fill();
            ctx.restore(); return;
        }
        
        ctx.fillStyle = body.customColor || '#FFF';
        ctx.beginPath(); body.vertices.forEach((v, i) => { if (i===0) ctx.moveTo(v.x, v.y); else ctx.lineTo(v.x, v.y); });
        ctx.closePath(); ctx.fill();
        
        if (body.label === 'glass' || (body.label === 'debris' && body.customColor.includes('173'))) {
            ctx.strokeStyle = 'rgba(255,255,255,0.8)'; ctx.lineWidth = 3; ctx.stroke();
            ctx.save(); ctx.clip(); ctx.fillStyle = 'rgba(255,255,255,0.3)';
            ctx.beginPath(); ctx.moveTo(body.vertices[0].x, body.vertices[0].y); ctx.lineTo(body.vertices[1].x, body.vertices[1].y); ctx.lineTo(body.vertices[1].x, body.vertices[1].y + 15); ctx.lineTo(body.vertices[0].x, body.vertices[0].y + 15); ctx.fill(); ctx.restore();
        } else if (!body.label.includes('debris')) {
            ctx.strokeStyle = 'rgba(255,255,255,0.2)'; ctx.lineWidth = 2; ctx.stroke();
        }
    });

    if (turnState === 'AIMING' && projectile) {
        ctx.strokeStyle = '#FF7F50'; ctx.lineWidth = 15; ctx.lineCap = 'round';
        ctx.beginPath(); ctx.moveTo(SLING_ANCHOR.x + 15, SLING_ANCHOR.y); ctx.lineTo(projectile.position.x, projectile.position.y); ctx.stroke();
    } else if (turnState === 'IDLE') {
        ctx.strokeStyle = '#FF7F50'; ctx.lineWidth = 15; ctx.lineCap = 'round';
        ctx.beginPath(); ctx.moveTo(SLING_ANCHOR.x - 15, SLING_ANCHOR.y); ctx.lineTo(SLING_ANCHOR.x + 15, SLING_ANCHOR.y); ctx.stroke();
        if (projectile) Matter.Body.setPosition(projectile, SLING_ANCHOR);
    }
    
    ctx.fillStyle = '#8B4513'; ctx.fillRect(SLING_ANCHOR.x + 5, SLING_ANCHOR.y, 10, 1600 - SLING_ANCHOR.y);

    for (let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.5; p.life -= 0.02;
        if (p.life <= 0) { particles.splice(i, 1); continue; }
        ctx.globalAlpha = Math.max(0, p.life); ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha = 1.0; ctx.restore();
}

window.onload = () => { uiShowMenu(); requestAnimationFrame(render); };
</script>
