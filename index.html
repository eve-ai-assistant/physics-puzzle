<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ZERO DEFECTS</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        /* === CORE CSS & MOBILE LOCKDOWN === */
        :root {
            --primary: #0984e3; --primary-dark: #074a80;
            --danger: #d63031; --warning: #fdcb6e; --warning-dark: #e1b12c;
            --success: #00b894; --success-dark: #009432;
            --dark: #2d3436; --light: #dfe6e9;
        }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%; background: #000;
            display: flex; justify-content: center; align-items: center; overflow: hidden;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            touch-action: none; overscroll-behavior: none;
            user-select: none; -webkit-user-select: none;
        }
        
        /* Forces landscape suggestion on mobile */
        #rotate-hint { display: none; }
        @media (orientation: portrait) {
            #rotate-hint {
                display: flex; position: absolute; z-index: 999; width: 100vw; height: 100vh;
                background: #111; color: white; justify-content: center; align-items: center;
                font-size: 24px; font-weight: bold; text-align: center; padding: 20px; box-sizing: border-box;
            }
        }

        #game-wrapper {
            position: relative; width: 1600px; height: 900px;
            background: linear-gradient(to bottom, #74b9ff, #0984e3);
            box-shadow: 0 0 50px rgba(0,0,0,1); overflow: hidden;
            transform-origin: center center;
        }
        canvas { position: absolute; top: 0; left: 0; z-index: 1; }

        /* === UI OVERLAYS === */
        .ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10; pointer-events: none;
        }
        .screen {
            position: absolute; width: 100%; height: 100%; pointer-events: auto;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(45, 52, 54, 0.85); backdrop-filter: blur(8px);
            transition: opacity 0.3s;
        }
        .panel {
            background: white; padding: 50px; border-radius: 24px; border: 6px solid var(--light);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); text-align: center;
        }
        
        h1 { font-size: 60px; color: var(--primary); margin: 0 0 10px 0; font-weight: 900; letter-spacing: 2px;}
        h2 { font-size: 40px; color: var(--dark); margin: 0 0 30px 0; font-weight: 900; }
        p { font-size: 24px; color: #636e72; margin-bottom: 40px; font-weight: bold;}
        
        button {
            background: var(--primary); color: white; border: none; padding: 20px 45px;
            font-size: 28px; font-weight: 900; border-radius: 16px; cursor: pointer;
            box-shadow: 0 8px 0 var(--primary-dark); transition: transform 0.1s;
            text-transform: uppercase; letter-spacing: 2px; margin: 10px; font-family: inherit;
        }
        button:active { transform: translateY(8px); box-shadow: 0 0px 0 var(--primary-dark); }
        button.btn-alt { background: var(--light); color: var(--dark); box-shadow: 0 8px 0 #b2bec3; }
        button.btn-alt:active { box-shadow: 0 0px 0 #b2bec3; }
        button.btn-success { background: var(--success); box-shadow: 0 8px 0 var(--success-dark); }
        button.btn-success:active { box-shadow: 0 0px 0 var(--success-dark); }

        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .lvl-btn {
            width: 110px; height: 110px; padding: 0; display: flex; flex-direction: column;
            align-items: center; justify-content: center; font-size: 40px;
        }
        .lvl-btn.locked { background: #b2bec3; box-shadow: 0 8px 0 #636e72; color: #636e72; opacity: 0.8; }
        .stars { font-size: 18px; color: var(--warning); margin-top: 5px; text-shadow: 0 2px 0 rgba(0,0,0,0.2); }
        .stars-big { font-size: 90px; color: var(--warning); text-shadow: 0 6px 0 var(--warning-dark); margin: 20px 0; }

        /* === HUD === */
        .hud-top { position: absolute; top: 30px; left: 30px; pointer-events: auto; }
        .btn-icon { width: 80px; height: 80px; padding: 0; border-radius: 50%; font-size: 40px; background: white; color: var(--dark); box-shadow: 0 8px 0 #b2bec3; margin-right: 15px;}
        .btn-icon:active { box-shadow: 0 0 0 #b2bec3; }
        .hud-score { position: absolute; top: 30px; right: 40px; text-align: right; font-size: 48px; font-weight: 900; color: white; text-shadow: 0 4px 10px rgba(0,0,0,0.6); }
        .hud-sub { font-size: 28px; color: var(--warning); }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="rotate-hint">Please rotate device<br>to landscape mode.</div>

<div id="game-wrapper">
    <canvas id="gameCanvas" width="1600" height="900"></canvas>
    
    <div id="ui-layer" class="ui-layer">
        <div id="ui-menu" class="screen">
            <div class="panel">
                <h1>ZERO DEFECTS</h1>
                <p>Premium Physics Puzzle</p>
                <button class="btn-success" onclick="showLevels()">PLAY</button>
            </div>
        </div>
        
        <div id="ui-levels" class="screen hidden">
            <div class="panel">
                <h2>SELECT LEVEL</h2>
                <div class="grid" id="level-grid"></div>
                <button class="btn-alt" onclick="showMenu()">BACK</button>
            </div>
        </div>
        
        <div id="ui-hud" class="screen hidden" style="background: transparent; backdrop-filter: none;">
            <div class="hud-top">
                <button class="btn-icon" onclick="showLevels()">☰</button>
                <button class="btn-icon" onclick="loadLevel(currentLevelIdx)">↻</button>
            </div>
            <div class="hud-score">
                <div>LEVEL <span id="hud-lvl">1</span></div>
                <div class="hud-sub">SHOTS: <span id="hud-shots">3</span></div>
            </div>
        </div>
        
        <div id="ui-result" class="screen hidden">
            <div class="panel">
                <h1 id="res-title">LEVEL CLEARED!</h1>
                <div id="res-stars" class="stars-big">★★★</div>
                <div style="display:flex; justify-content:center; gap:15px; flex-wrap:wrap;">
                    <button class="btn-alt" onclick="showLevels()">MENU</button>
                    <button class="btn-alt" onclick="loadLevel(currentLevelIdx)">RETRY</button>
                    <button class="btn-success" id="btn-next" onclick="loadLevel(currentLevelIdx + 1)">NEXT ➡</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
/**
 * ============================================================================
 * 1. CONFIGURATION & SCALING LOGIC
 * ============================================================================
 */
function handleResize() {
    const wrapper = document.getElementById('game-wrapper');
    const scale = Math.min(window.innerWidth / 1600, window.innerHeight / 900);
    wrapper.style.transform = `scale(${scale})`;
}
window.addEventListener('resize', handleResize);
handleResize();

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d', { alpha: false });

const { Engine, World, Bodies, Composite, Events, Vector, Body } = Matter;
const engine = Engine.create({ positionIterations: 8, velocityIterations: 8 });
engine.gravity.y = 1.2;

const slingAnchor = { x: 300, y: 680 };
const groundY = 820;
const maxStretch = 180;

let state = 'MENU'; // MENU, LEVELS, PLAYING, RESULT
let playState = 'IDLE'; // IDLE, AIMING, FIRED
let currentLevelIdx = 0;
let shotsRemaining = 0;
let targetsRemaining = 0;
let settleTimer = 0;

let projectile = null;
let particles = [];
let trailParticles = [];
let bodiesToRemove = [];

// Physics tuned for maximum satisfaction via Kinetic Energy
const MATERIALS = {
    wood: { density: 0.004, friction: 0.6, restitution: 0.2, hp: 1500, color: '#e67e22', border: '#d35400' },
    stone: { density: 0.010, friction: 0.8, restitution: 0.1, hp: 4000, color: '#95a5a6', border: '#7f8c8d' },
    glass: { density: 0.002, friction: 0.2, restitution: 0.1, hp: 400, color: 'rgba(129, 236, 236, 0.7)', border: '#00cec9' },
    target: { density: 0.002, friction: 0.5, restitution: 0.4, hp: 300, color: '#ff7675', border: '#d63031' }
};

/**
 * ============================================================================
 * 2. SYNTHETIC WEB AUDIO ENGINE
 * ============================================================================
 */
const AudioSys = {
    ctx: null, unlocked: false, lastHit: 0,
    init() {
        if (!this.unlocked) {
            this.ctx = new (window.AudioContext || window.webkitAudioContext)();
            if (this.ctx.state === 'suspended') this.ctx.resume();
            const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
            gain.gain.value = 0; osc.connect(gain); gain.connect(this.ctx.destination);
            osc.start(); osc.stop(this.ctx.currentTime + 0.01);
            this.unlocked = true;
        }
    },
    playTone(type, fStart, fEnd, dur, vol) {
        if (!this.unlocked || this.ctx.state !== 'running') return;
        const t = this.ctx.currentTime;
        const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
        osc.type = type; osc.frequency.setValueAtTime(fStart, t);
        if (fEnd) osc.frequency.exponentialRampToValueAtTime(fEnd, t + dur);
        gain.gain.setValueAtTime(vol, t); gain.gain.exponentialRampToValueAtTime(0.01, t + dur);
        osc.connect(gain); gain.connect(this.ctx.destination);
        osc.start(t); osc.stop(t + dur);
    },
    playNoise(dur, vol, filterFreq, filterType = 'lowpass') {
        if (!this.unlocked || this.ctx.state !== 'running') return;
        const t = this.ctx.currentTime;
        const bufSize = this.ctx.sampleRate * dur;
        const buf = this.ctx.createBuffer(1, bufSize, this.ctx.sampleRate);
        const data = buf.getChannelData(0);
        for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
        const noise = this.ctx.createBufferSource(); noise.buffer = buf;
        const filter = this.ctx.createBiquadFilter(); filter.type = filterType; filter.frequency.value = filterFreq;
        const gain = this.ctx.createGain();
        gain.gain.setValueAtTime(vol, t); gain.gain.exponentialRampToValueAtTime(0.01, t + dur);
        noise.connect(filter); filter.connect(gain); gain.connect(this.ctx.destination);
        noise.start(t);
    },
    play(type) {
        if (type === 'launch') this.playTone('sine', 200, 700, 0.4, 0.5);
        if (type === 'pop') { this.playTone('square', 600, 150, 0.2, 0.4); this.playNoise(0.1, 0.2, 1000, 'lowpass'); }
        if (type === 'win') [440, 554, 659, 880].forEach((f, i) => setTimeout(() => this.playTone('sine', f, f, 0.4, 0.4), i * 150));
    },
    playHit(mat, impact) {
        const now = Date.now();
        if (now - this.lastHit < 50) return; // Debounce micro-collisions
        this.lastHit = now;
        let vol = Math.min(0.5, impact / 5000);
        if (mat === 'glass') { this.playNoise(0.2, vol, 3000, 'highpass'); this.playTone('triangle', 1200, 2000, 0.1, vol); }
        else if (mat === 'wood') { this.playNoise(0.3, vol, 800, 'lowpass'); this.playTone('sawtooth', 150, 50, 0.2, vol); }
        else { this.playNoise(0.4, vol, 400, 'lowpass'); this.playTone('square', 80, 40, 0.3, vol); }
    }
};
window.addEventListener('pointerdown', () => AudioSys.init(), { once: true });

/**
 * ============================================================================
 * 3. LEVEL DESIGN & CONSTRUCTION
 * ============================================================================
 */
function addRect(x, y, w, h, mat) {
    const p = MATERIALS[mat];
    const b = Bodies.rectangle(x, y, w, h, { density: p.density, friction: p.friction, restitution: p.restitution });
    b.custom = { type: mat, hp: p.hp, maxHp: p.hp, color: p.color, border: p.border, w, h };
    World.add(engine.world, b);
}
function addTarget(x, y, r) {
    const p = MATERIALS.target;
    const b = Bodies.circle(x, y, r, { density: p.density, friction: p.friction, restitution: p.restitution });
    b.custom = { type: 'target', hp: p.hp, maxHp: p.hp, color: p.color, border: p.border, r };
    targetsRemaining++;
    World.add(engine.world, b);
}

const Levels = [
    {
        shots: 3, // Level 1: Glass House
        setup: () => {
            addRect(1000, 750, 40, 100, 'glass'); addRect(1150, 750, 40, 100, 'glass');
            addRect(1075, 680, 220, 40, 'wood'); addTarget(1075, 770, 30);
        }
    },
    {
        shots: 3, // Level 2: Shielded Core
        setup: () => {
            addRect(950, 750, 40, 100, 'wood'); addRect(1150, 750, 40, 100, 'wood');
            addRect(1050, 680, 260, 40, 'stone'); addRect(1050, 610, 40, 100, 'glass');
            addTarget(1050, 770, 30); addTarget(1050, 550, 30);
        }
    },
    {
        shots: 2, // Level 3: Domino Pillars
        setup: () => {
            for (let i = 0; i < 4; i++) {
                addRect(850 + i * 150, 700, 30, 200, 'stone');
                addTarget(925 + i * 150, 770, 30);
            }
        }
    },
    {
        shots: 4, // Level 4: The Fortress
        setup: () => {
            addRect(900, 700, 50, 200, 'stone'); addRect(1300, 700, 50, 200, 'stone');
            addRect(1100, 580, 500, 40, 'wood');
            addRect(1000, 480, 40, 160, 'glass'); addRect(1200, 480, 40, 160, 'glass');
            addRect(1100, 380, 300, 40, 'wood');
            addTarget(1100, 770, 30); addTarget(1100, 530, 30);
        }
    },
    {
        shots: 3, // Level 5: The Citadel
        setup: () => {
            addRect(950, 650, 60, 300, 'stone'); addRect(1250, 650, 60, 300, 'stone');
            addRect(1100, 480, 400, 40, 'stone'); addRect(1100, 410, 40, 100, 'wood');
            addTarget(1100, 770, 30); addTarget(1100, 350, 30);
        }
    }
];

/**
 * ============================================================================
 * 4. PHYSICS & DESTRUCTION
 * ============================================================================
 */
Events.on(engine, 'collisionStart', event => {
    event.pairs.forEach(pair => {
        const a = pair.bodyA; const b = pair.bodyB;
        const speed = Vector.magnitude(Vector.sub(a.velocity, b.velocity));
        if (speed < 1.0) return; // Ignore resting jitters
        
        // Exact Kinetic Energy Proxy: 0.5 * reduced_mass * v^2
        const speedSq = speed * speed;
        const massA = a.isStatic ? b.mass * 2 : a.mass;
        const massB = b.isStatic ? a.mass * 2 : b.mass;
        
        const dmgA = 0.5 * massB * speedSq;
        const dmgB = 0.5 * massA * speedSq;

        if (dmgA > 100 && a.custom) a.custom.hp -= dmgA;
        if (dmgB > 100 && b.custom) b.custom.hp -= dmgB;

        if (dmgA > 200 || dmgB > 200) {
            let mat = a.custom ? a.custom.type : (b.custom ? b.custom.type : 'stone');
            AudioSys.playHit(mat, Math.max(dmgA, dmgB));
        }
    });
});

function spawnParticles(x, y, color, isTarget) {
    const count = isTarget ? 30 : 15;
    for (let i = 0; i < count; i++) {
        let angle = Math.random() * Math.PI * 2; let speed = Math.random() * 10 + 2;
        particles.push({
            x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed - 2,
            life: 1.0, decay: Math.random() * 0.02 + 0.015, color,
            size: Math.random() * 8 + 4, isSquare: !isTarget
        });
    }
}

function updateGameLogic() {
    if (bodiesToRemove.length > 0) {
        World.remove(engine.world, bodiesToRemove); bodiesToRemove = [];
    }

    let isMoving = false; let projActive = false;

    Composite.allBodies(engine.world).forEach(b => {
        if (!b.custom || b.custom.type === 'ground') return;
        
        // Out of Bounds kill-box
        if (b.position.y > 1200 || b.position.x < -500 || b.position.x > 2500) b.custom.hp = 0;

        if (b.custom.hp <= 0 && !b.custom.destroyed) {
            b.custom.destroyed = true; bodiesToRemove.push(b);
            spawnParticles(b.position.x, b.position.y, b.custom.color, b.custom.type === 'target');
            if (b.custom.type === 'target') {
                targetsRemaining--; AudioSys.play('pop'); document.getElementById('hud-shots').innerText = shotsRemaining;
            } else AudioSys.playHit(b.custom.type, 1000);
        }

        if (!b.isStatic && b.speed > 0.5) isMoving = true;
        
        if (b === projectile) {
            projActive = true;
            if (b.speed < 0.5 && Math.abs(b.angularVelocity) < 0.1 && playState === 'FIRED') {
                b.stopTimer = (b.stopTimer || 0) + 1;
                if (b.stopTimer > 60) b.custom.hp = 0;
            } else b.stopTimer = 0;
        }
    });

    if (playState === 'FIRED') {
        if (targetsRemaining === 0) {
            if (!isMoving) { settleTimer++; if (settleTimer > 90) winLevel(); } 
            else settleTimer = 0;
        } else if (!isMoving && !projActive) {
            settleTimer++;
            if (settleTimer > 60) {
                settleTimer = 0;
                if (shotsRemaining === 0) loseLevel();
                else spawnProjectile();
            }
        } else settleTimer = 0;
    }
}

/**
 * ============================================================================
 * 5. INPUT HANDLING (Mobile Safe)
 * ============================================================================
 */
let activePointerId = null;
let isDragging = false;
let dragPos = { x: 0, y: 0 };

function getLogicalPos(e) {
    const wrapper = document.getElementById('game-wrapper');
    const rect = wrapper.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return { x: (clientX - rect.left) * (1600 / rect.width), y: (clientY - rect.top) * (900 / rect.height) };
}

window.addEventListener('pointerdown', e => {
    if (e.target.closest('button')) return;
    if (state !== 'PLAYING' || playState !== 'IDLE' || activePointerId !== null) return;
    
    const pos = getLogicalPos(e);
    if (Math.hypot(pos.x - slingAnchor.x, pos.y - slingAnchor.y) < 120) {
        activePointerId = e.pointerId; isDragging = true; playState = 'AIMING';
        Body.setStatic(projectile, true);
    }
});

window.addEventListener('pointermove', e => {
    if (!isDragging || e.pointerId !== activePointerId) return;
    let pos = getLogicalPos(e);
    let dx = pos.x - slingAnchor.x; let dy = pos.y - slingAnchor.y;
    let dist = Math.hypot(dx, dy);
    if (dist > maxStretch) { dx = (dx / dist) * maxStretch; dy = (dy / dist) * maxStretch; }
    if (slingAnchor.y + dy > groundY - 20) dy = groundY - 20 - slingAnchor.y;
    dragPos = { x: slingAnchor.x + dx, y: slingAnchor.y + dy };
    Body.setPosition(projectile, dragPos);
});

const handleRelease = e => {
    if (!isDragging || e.pointerId !== activePointerId) return;
    isDragging = false; activePointerId = null;

    let dx = slingAnchor.x - dragPos.x; let dy = slingAnchor.y - dragPos.y;
    if (Math.hypot(dx, dy) > 20) {
        playState = 'FIRED'; shotsRemaining--; document.getElementById('hud-shots').innerText = shotsRemaining;
        Body.setStatic(projectile, false);
        Body.setVelocity(projectile, { x: dx * 0.16, y: dy * 0.16 });
        AudioSys.play('launch');
    } else {
        playState = 'IDLE'; Body.setPosition(projectile, slingAnchor);
    }
};
window.addEventListener('pointerup', handleRelease);
window.addEventListener('pointercancel', handleRelease);

// Hardlock viewport drag on mobile
document.addEventListener('touchmove', e => { if (!e.target.closest('.screen')) e.preventDefault(); }, { passive: false });

/**
 * ============================================================================
 * 6. UI & STATE MANAGEMENT
 * ============================================================================
 */
function showScreen(id) {
    document.querySelectorAll('.screen').forEach(el => el.classList.add('hidden'));
    document.getElementById(id).classList.remove('hidden');
}

function showMenu() { state = 'MENU'; showScreen('ui-menu'); }

function showLevels() {
    state = 'LEVELS'; showScreen('ui-levels');
    const grid = document.getElementById('level-grid'); grid.innerHTML = '';
    let p = {}; try { p = JSON.parse(localStorage.getItem('zeroDefects') || '{}'); } catch(e){}
    
    Levels.forEach((_, i) => {
        const stars = p[i] || 0; const unlocked = i === 0 || (p[i-1] && p[i-1] > 0);
        const btn = document.createElement('button');
        btn.className = `lvl-btn ${unlocked ? '' : 'locked'}`;
        btn.innerHTML = `<div>${i + 1}</div><div class="stars">${unlocked ? '★'.repeat(stars) + '☆'.repeat(3-stars) : '🔒'}</div>`;
        if (unlocked) btn.onclick = () => { AudioSys.init(); loadLevel(i); };
        grid.appendChild(btn);
    });
}

function loadLevel(idx) {
    currentLevelIdx = idx; targetsRemaining = 0; shotsRemaining = Levels[idx].shots;
    playState = 'IDLE'; settleTimer = 0;
    
    World.clear(engine.world); Engine.clear(engine);
    particles = []; trailParticles = []; bodiesToRemove = [];
    
    const ground = Bodies.rectangle(800, groundY + 50, 3000, 100, { isStatic: true, friction: 1.0 });
    ground.custom = { type: 'ground', w: 3000, h: 100 };
    World.add(engine.world, ground);
    
    Levels[idx].setup(); spawnProjectile();
    
    document.getElementById('hud-lvl').innerText = idx + 1;
    document.getElementById('hud-shots').innerText = shotsRemaining;
    showScreen('ui-hud'); state = 'PLAYING';
}

function spawnProjectile() {
    projectile = Bodies.circle(slingAnchor.x, slingAnchor.y, 20, {
        density: 0.015, friction: 0.5, restitution: 0.4, bullet: true, frictionAir: 0.005,
        collisionFilter: { group: -1 } // Prevent snapping against slingshot
    });
    projectile.custom = { type: 'projectile', color: '#0984e3', border: '#074a80', r: 20 };
    World.add(engine.world, projectile); playState = 'IDLE';
}

function winLevel() {
    state = 'RESULT'; AudioSys.play('win');
    let stars = 1;
    if (shotsRemaining >= Levels[currentLevelIdx].shots - 1) stars = 3;
    else if (shotsRemaining >= Levels[currentLevelIdx].shots - 2) stars = 2;
    
    try {
        let p = JSON.parse(localStorage.getItem('zeroDefects') || '{}');
        if ((p[currentLevelIdx] || 0) < stars) {
            p[currentLevelIdx] = stars; localStorage.setItem('zeroDefects', JSON.stringify(p));
        }
    } catch(e){}
    
    document.getElementById('res-title').innerText = 'LEVEL CLEARED!';
    document.getElementById('res-title').style.color = 'var(--success)';
    document.getElementById('res-stars').innerText = '★'.repeat(stars) + '☆'.repeat(3-stars);
    document.getElementById('btn-next').style.display = currentLevelIdx < Levels.length - 1 ? 'inline-block' : 'none';
    showScreen('ui-result');
}

function loseLevel() {
    state = 'RESULT';
    document.getElementById('res-title').innerText = 'OUT OF AMMO!';
    document.getElementById('res-title').style.color = 'var(--danger)';
    document.getElementById('res-stars').innerText = '☆☆☆';
    document.getElementById('btn-next').style.display = 'none';
    showScreen('ui-result');
}

/**
 * ============================================================================
 * 7. RENDERING PIPELINE & MAIN LOOP
 * ============================================================================
 */
const bgClouds = [ {x: 200, y: 300, s: 1, v: 0.2}, {x: 800, y: 200, s: 0.7, v: 0.1}, {x: 1300, y: 350, s: 1.2, v: 0.3}, {x: -100, y: 150, s: 0.9, v: 0.15} ];

function drawScene() {
    // 1. Background
    let grad = ctx.createLinearGradient(0, 0, 0, groundY);
    grad.addColorStop(0, '#74b9ff'); grad.addColorStop(1, '#0984e3');
    ctx.fillStyle = grad; ctx.fillRect(0, 0, 1600, 900);
    ctx.fillStyle = '#ffeaa7'; ctx.beginPath(); ctx.arc(1400, 200, 80, 0, Math.PI*2); ctx.fill(); // Sun
    
    ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
    bgClouds.forEach(c => {
        c.x += c.v; if (c.x > 1800) c.x = -200;
        ctx.beginPath(); ctx.arc(c.x, c.y, 60*c.s, 0, Math.PI*2);
        ctx.arc(c.x + 50*c.s, c.y - 30*c.s, 70*c.s, 0, Math.PI*2);
        ctx.arc(c.x + 100*c.s, c.y, 60*c.s, 0, Math.PI*2); ctx.fill();
    });
    
    // Ground
    ctx.fillStyle = '#00b894'; ctx.fillRect(0, groundY, 1600, 900 - groundY);
    ctx.fillStyle = '#55efc4'; ctx.fillRect(0, groundY, 1600, 15);

    if (state === 'MENU' || state === 'LEVELS') return;

    // 2. Trajectory Preview
    if (playState === 'AIMING') {
        const dx = slingAnchor.x - dragPos.x; const dy = slingAnchor.y - dragPos.y;
        if (Math.hypot(dx, dy) > 20) {
            let vx = dx * 0.16; let vy = dy * 0.16; let px = slingAnchor.x; let py = slingAnchor.y;
            const gravY = engine.gravity.y * engine.gravity.scale * 16.666;
            ctx.beginPath(); ctx.strokeStyle = 'rgba(255, 255, 255, 0.6)'; ctx.lineWidth = 4; ctx.setLineDash([15, 15]); ctx.moveTo(px, py);
            for (let i = 0; i < 60; i++) {
                vy += gravY; vx *= 0.995; vy *= 0.995; // Accurate frictionAir integration
                px += vx; py += vy; ctx.lineTo(px, py); if (py > groundY) break;
            }
            ctx.stroke(); ctx.setLineDash([]);
        }
    }

    // 3. Back Slingshot Band
    if (playState === 'AIMING') {
        ctx.lineWidth = Math.max(3, 16 - (Math.hypot(dragPos.x - slingAnchor.x, dragPos.y - slingAnchor.y) / maxStretch) * 12);
        ctx.strokeStyle = '#2d3436'; ctx.beginPath();
        ctx.moveTo(slingAnchor.x - 15, slingAnchor.y + 10); ctx.lineTo(projectile.position.x, projectile.position.y); ctx.stroke();
    }
    ctx.fillStyle = '#8b4513'; ctx.fillRect(slingAnchor.x - 10, slingAnchor.y + 20, 20, groundY - slingAnchor.y - 20); // Back Pillar

    // 4. Rigid Bodies
    Composite.allBodies(engine.world).forEach(b => {
        if (!b.custom || b.custom.type === 'ground') return;
        ctx.save(); ctx.translate(b.position.x, b.position.y); ctx.rotate(b.angle);
        const cd = b.custom;
        
        ctx.fillStyle = cd.color;
        if (cd.type === 'glass') ctx.globalAlpha = Math.max(0.3, 0.7 * (cd.hp / cd.maxHp));
        
        if (cd.r) {
            ctx.beginPath(); ctx.arc(0, 0, cd.r, 0, Math.PI * 2); ctx.fill();
            ctx.lineWidth = 3; ctx.strokeStyle = cd.border; ctx.stroke();
            
            ctx.globalAlpha = 1; ctx.fillStyle = 'white';
            ctx.beginPath(); ctx.arc(-8, -5, 6, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(8, -5, 6, 0, Math.PI*2); ctx.fill();
            
            ctx.fillStyle = 'black'; let eyeOffsetX = (playState === 'FIRED' && cd.type === 'projectile') ? 3 : 0;
            ctx.beginPath(); ctx.arc(-8 + eyeOffsetX, -5, 2.5, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(8 + eyeOffsetX, -5, 2.5, 0, Math.PI*2); ctx.fill();
            
            ctx.lineWidth = 3;
            if (cd.type === 'projectile') {
                ctx.beginPath(); ctx.moveTo(-15, -12); ctx.lineTo(-4, -8); ctx.stroke(); ctx.beginPath(); ctx.moveTo(15, -12); ctx.lineTo(4, -8); ctx.stroke();
            } else {
                ctx.beginPath(); ctx.arc(0, 6, 4, 0, Math.PI); ctx.stroke();
            }
        } else {
            ctx.fillRect(-cd.w/2, -cd.h/2, cd.w, cd.h);
            ctx.lineWidth = 3; ctx.strokeStyle = cd.border; ctx.strokeRect(-cd.w/2, -cd.h/2, cd.w, cd.h);
            if (cd.hp < cd.maxHp * 0.6 && cd.type !== 'glass') {
                ctx.beginPath(); ctx.moveTo(-cd.w/3, -cd.h/3); ctx.lineTo(0, 0); ctx.lineTo(cd.w/3, cd.h/4); ctx.stroke();
            }
        }
        ctx.restore();
    });

    // 5. Front Slingshot Band
    if (playState === 'AIMING') {
        ctx.beginPath(); ctx.moveTo(slingAnchor.x + 15, slingAnchor.y + 10); ctx.lineTo(projectile.position.x, projectile.position.y); ctx.stroke();
    }
    ctx.fillStyle = '#a0522d'; ctx.fillRect(slingAnchor.x - 20, slingAnchor.y, 15, groundY - slingAnchor.y); // Front Pillar

    // 6. Particles
    particles.forEach(p => {
        ctx.globalAlpha = Math.max(0, p.life); ctx.fillStyle = p.color;
        if (p.isSquare) ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
        else { ctx.beginPath(); ctx.arc(p.x, p.y, p.size/2, 0, Math.PI*2); ctx.fill(); }
    });
    trailParticles.forEach(p => {
        ctx.globalAlpha = Math.max(0, p.life); ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.size/2, 0, Math.PI*2); ctx.fill();
    });
    ctx.globalAlpha = 1;
}

let lastTime = performance.now();
let timeAccumulator = 0;
const FIXED_DT = 16.666;

function loop(time) {
    requestAnimationFrame(loop);
    let dt = time - lastTime; lastTime = time;
    if (dt > 100) dt = FIXED_DT; // Prevent delta spikes on tab switch
    
    if (state === 'PLAYING') {
        timeAccumulator += dt;
        while (timeAccumulator >= FIXED_DT) {
            Engine.update(engine, FIXED_DT);
            updateGameLogic();
            timeAccumulator -= FIXED_DT;
        }
        
        if (playState === 'FIRED' && projectile.speed > 5 && Math.random() > 0.3) {
            trailParticles.push({ x: projectile.position.x, y: projectile.position.y, life: 0.6, color: 'rgba(255,255,255,0.7)', size: 10 });
        }
    }
    
    let tScale = dt / FIXED_DT;
    for (let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i]; p.vy += 0.4 * tScale; p.x += p.vx * tScale; p.y += p.vy * tScale; p.life -= p.decay * tScale;
        if (p.life <= 0) particles.splice(i, 1);
    }
    for (let i = trailParticles.length - 1; i >= 0; i--) {
        trailParticles[i].life -= 0.03 * tScale;
        if (trailParticles[i].life <= 0) trailParticles.splice(i, 1);
    }
    
    drawScene();
}

showMenu();
requestAnimationFrame(loop);

</script>
